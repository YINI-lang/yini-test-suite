# Taskfile.yml for yini-test-suite.

# Setup on Windows:
# winget install Task.Task
# task --init

version: '3'

vars:
  PATH_CASES: src/yini_test/cases

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  help:
    desc: Show yini-test-suite CLI help
    env:
      PYTHONPATH: src
    cmds:
      - python -m yini_test --help

  install:
    desc: Install development dependencies and install yini-test-suite in editable mode
    cmds:
      - python -m pip install -r requirements-dev.txt
      - python -m pip install -e .

  install-dev:
    desc: Install development dependencies only
    cmds:
      - python -m pip install -r requirements-dev.txt

  # ---------------------------------------------------------------------------
  # Tests for yini-test-suite itself.
  # ---------------------------------------------------------------------------

  test:
    desc: Run unit/integration tests for yini-test-suite itself with warnings treated as errors
    cmds:
      - python -m pytest -v -W error

  test-relaxed:
    desc: Run unit/integration tests without promoting warnings to errors
    cmds:
      - python -m pytest -v

  test-debug:
    desc: Run unit/integration tests for yini-test-suite itself with stdout/stderr enabled
    cmds:
      - python -m pytest -v -s

  lint:
    desc: Run Ruff linter
    cmds:
      - python -m ruff check src tests

  typecheck:
    desc: Run mypy type checking
    platforms: [windows]
    cmds:
      - cmd /c "set MYPYPATH=src&& python -m mypy -p yini_test --explicit-package-bases --ignore-missing-imports"

  format-check:
    desc: Check code formatting with Ruff
    cmds:
      - python -m ruff format --check src tests

  format:
    desc: Format code with Ruff
    cmds:
      - python -m ruff format src tests

  check:
    desc: Run all project checks for yini-test-suite itself
    cmds:
      - task lint
      - task format-check
      - task typecheck
      - task test

  # ---------------------------------------------------------------------------
  # Run yini-test-suite cases against yini-parser-typescript.
  # ---------------------------------------------------------------------------

  run-smoke-typescript-lenient:
    desc: Run lenient smoke cases against yini-parser-typescript
    env:
      PYTHONPATH: src
    cmds:
      - python -m yini_test smoke --cases-root {{.PATH_CASES}} --adapter node ../yini-parser-typescript/dist-tools/tools/yini-test-adapter.js --input {input} --mode {mode}

  run-smoke-typescript-strict:
    desc: Run strict smoke cases against yini-parser-typescript
    env:
      PYTHONPATH: src
    cmds:
      - python -m yini_test smoke --strict --cases-root {{.PATH_CASES}} --adapter node ../yini-parser-typescript/dist-tools/tools/yini-test-adapter.js --input {input} --mode {mode}

  run-all-typescript:
    desc: Run smoke and golden cases in lenient and strict mode against yini-parser-typescript
    env:
      PYTHONPATH: src
    cmds:
      - python -m yini_test all --all-modes --cases-root {{.PATH_CASES}} --adapter node ../yini-parser-typescript/dist-tools/tools/yini-test-adapter.js --input {input} --mode {mode}

  # ---------------------------------------------------------------------------
  # Run yini-test-suite cases against yini-parser-python.
  # ---------------------------------------------------------------------------

  run-smoke-python-lenient:
    desc: Run lenient smoke cases against yini-parser-python
    env:
      PYTHONPATH: src
      PYTHONIOENCODING: utf-8
    cmds:
      - python -m yini_test smoke --cases-root {{.PATH_CASES}} --adapter python ../yini-parser-python/tools/yini_parser_adapter.py --input {input} --mode {mode}

  run-smoke-python-strict:
    desc: Run strict smoke cases against yini-parser-python
    env:
      PYTHONPATH: src
      PYTHONIOENCODING: utf-8
    cmds:
      - python -m yini_test smoke --strict --cases-root {{.PATH_CASES}} --adapter python ../yini-parser-python/tools/yini_parser_adapter.py --input {input} --mode {mode}

  run-all-python:
    desc: Run smoke and golden cases in lenient and strict mode against yini-parser-python
    env:
      PYTHONPATH: src
      PYTHONIOENCODING: utf-8
    cmds:
      - python -m yini_test all --all-modes --cases-root {{.PATH_CASES}} --adapter python ../yini-parser-python/tools/yini_parser_adapter.py --input {input} --mode {mode}

  # ---------------------------------------------------------------------------
  # Convenience aliases.
  # ---------------------------------------------------------------------------

  smoke:
    desc: Run smoke cases against the default parser adapter
    cmds:
      - task run-smoke-typescript-lenient
      - task run-smoke-typescript-strict

  all:
    desc: Run all cases against the default parser adapter
    cmds:
      - task run-all-typescript

  adapters-smoke:
    desc: Run smoke cases against all configured parser adapters
    cmds:
      - task run-smoke-typescript-lenient
      - task run-smoke-typescript-strict
      - task run-smoke-python-lenient
      - task run-smoke-python-strict

  adapters-all:
    desc: Run all available cases against all configured parser adapters
    cmds:
      - task run-all-typescript
      - task run-all-python

  # ---------------------------------------------------------------------------
  # Cleanup.
  # ---------------------------------------------------------------------------

  clean-cache:
    desc: Delete Python cache files and __pycache__ directories under src and tests
    platforms: [windows]
    cmds:
      - powershell -NoProfile -Command "Get-ChildItem 'src','tests' -Recurse -Directory -Filter '__pycache__' -ErrorAction SilentlyContinue | Remove-Item -Recurse -Force"
      - powershell -NoProfile -Command "Get-ChildItem 'src','tests' -Recurse -File -Include *.pyc,*.pyo -ErrorAction SilentlyContinue | Remove-Item -Force"
      - powershell -NoProfile -Command "if (Test-Path '.pytest_cache') { Remove-Item -Recurse -Force '.pytest_cache' }"
      - powershell -NoProfile -Command "if (Test-Path '.mypy_cache') { Remove-Item -Recurse -Force '.mypy_cache' }"
      - powershell -NoProfile -Command "if (Test-Path '.ruff_cache') { Remove-Item -Recurse -Force '.ruff_cache' }"

  clean:
    desc: Delete caches only
    deps:
      - clean-cache
